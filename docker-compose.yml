# Veronica — Docker Compose
# Runs backend + Qdrant together locally.
# Frontend: https://veronica-drab.vercel.app
#
# Usage:
#   1. Copy backend/.env.example to backend/.env and fill in your keys
#   2. docker compose up --build
#   3. Backend available at http://localhost:8080
#   4. Update vercel.json on Veronica Vercel deployment:
#      destination: http://YOUR_PUBLIC_IP:8080/api/v1/:path*
#      OR use ngrok: ngrok http 8080

version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veronica-backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      # Qdrant runs as a companion container — override .env value
      QDRANT_URL: http://qdrant:6333
      PORT: "8080"
    volumes:
      # Persist doc_registry.json and memory.json across restarts
      - veronica_data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: veronica-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  veronica_data:
  qdrant_storage:
